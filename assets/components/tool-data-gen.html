<simulated-window>
    <div class="controls-section">
        <div class="control-group">
            <h3>包含字符</h3>
            <div class="checkbox-grid">
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="dg-digit" checked>
                    <span class="checkmark"></span>
                    <span>数字 (0-9)</span>
                </label>
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="dg-upper">
                    <span class="checkmark"></span>
                    <span>大写字母 (A-Z)</span>
                </label>
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="dg-lower">
                    <span class="checkmark"></span>
                    <span>小写字母 (a-z)</span>
                </label>
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="dg-symbol">
                    <span class="checkmark"></span>
                    <span>特殊符号</span>
                </label>
            </div>
        </div>

        <div class="control-group">
            <h3>参数设置</h3>
            <div class="slider-row"
                style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                <label style="margin-bottom: 0;">单条长度:</label>
                <input type="number" id="dg-length" min="1" max="1000" value="8" class="inline-input"
                    style="width: 80px;">
            </div>
            <div class="slider-row"
                style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                <label style="margin-bottom: 0;">生成数量:</label>
                <input type="number" id="dg-count" min="1" max="100000" value="10" class="inline-input"
                    style="width: 80px;">
            </div>
            <div class="slider-row" style="display: flex; align-items: center; justify-content: space-between;">
                <label style="margin-bottom: 0;">分隔符号:</label>
                <div style="display: flex; gap: 8px;">
                    <select id="dg-separator" class="select-input">
                        <option value="\n">换行符 (\n)</option>
                        <option value=",">逗号 (,)</option>
                        <option value=" ">空格 (Space)</option>
                        <option value="">无</option>
                        <option value="custom">自定义</option>
                    </select>
                    <input type="text" id="dg-custom-separator" class="inline-input" style="width: 60px; display: none;"
                        placeholder="分隔符">
                </div>
            </div>
        </div>
    </div>

    <div class="action-section">
        <button id="dg-generate-btn" class="primary-btn">
            <span class="icon">⚡</span> 立即生成
        </button>
    </div>

    <div class="output-section">
        <div class="output-header">
            <label for="dg-output">生成结果 <span class="badge success" id="dg-result-info">Ready</span></label>
            <button class="icon-btn tooltip copy-btn" data-target="dg-output" data-tooltip="复制内容">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
        </div>
        <textarea id="dg-output" readonly placeholder="生成的数据将显示在这里..." style="height: 300px;"></textarea>
    </div>
</simulated-window>
